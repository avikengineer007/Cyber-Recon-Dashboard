services:
  - type: web
    name: cyber-recon-dashboard
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NVD_API_KEY
        sync: false
      - key: NEXTAUTH_URL
        sync: false
